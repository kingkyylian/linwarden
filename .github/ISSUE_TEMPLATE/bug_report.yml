name: Bug report
description: Report incorrect behavior in Linwarden.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.5.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include command, fixture, or relevant host files if safe to share.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Distribution:
        - Python:
        - Shell:
        - Container or bare metal:
