name: Feature request
description: Suggest a rule, reporter, collector, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, CLI shape, or rule evidence.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Mention affected distributions, kernels, containers, or Python versions.
