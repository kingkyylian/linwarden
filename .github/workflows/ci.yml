name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Compile sources
        run: PYTHONPYCACHEPREFIX=.pycache python -m compileall -q src tests scripts

      - name: Run Ruff
        run: python -m ruff check src tests scripts

      - name: Run mypy
        run: python -m mypy

      - name: Smoke scan fixture
        run: linwarden scan --root tests/fixtures/linux-root --format json --fail-on off

      - name: Smoke SARIF output
        run: linwarden scan --root tests/fixtures/linux-root --config tests/fixtures/linwarden.json --format sarif --fail-on critical > linwarden.sarif

      - name: Validate SARIF JSON
        run: python -m json.tool linwarden.sarif > /dev/null

      - name: Upload SARIF
        if: github.event_name == 'push' && matrix.python-version == '3.13'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: linwarden.sarif

  action-smoke:
    name: Composite action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run local action with SARIF output
        uses: ./
        with:
          root: tests/fixtures/linux-root
          format: sarif
          output: linwarden-action.sarif
          fail-on: critical
          upload-sarif: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          python-version: "3.13"

      - name: Validate local action SARIF JSON
        run: python -m json.tool linwarden-action.sarif > /dev/null

      - name: Run local action with Markdown summary
        uses: ./
        with:
          root: tests/fixtures/linux-root
          format: markdown
          output: linwarden-action.md
          fail-on: off
          add-summary: "true"
          python-version: "3.13"

      - name: Verify Markdown report exists
        run: test -s linwarden-action.md
