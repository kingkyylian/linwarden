name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: Build release artifacts without creating GitHub or PyPI releases.
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Compile sources
        run: PYTHONPYCACHEPREFIX=.pycache python -m compileall -q src tests scripts

      - name: Run Ruff
        run: python -m ruff check src tests scripts

      - name: Run mypy
        run: python -m mypy

      - name: Build package
        run: python -m build

      - name: Upload Python package distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error
          retention-days: 7

      - name: Generate release checksums
        run: python scripts/release_assets.py dist

      - name: Upload release dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: release-dry-run-artifacts
          path: dist/*
          if-no-files-found: error
          retention-days: 7

      - name: Sign checksum manifest
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY is not configured; skipping detached checksum signature."
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          if [ -n "$GPG_PASSPHRASE" ]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --armor --detach-sign dist/SHA256SUMS
          else
            gpg --batch --yes --armor --detach-sign dist/SHA256SUMS
          fi

      - name: Generate artifact attestations
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Create GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --title "$GITHUB_REF_NAME"

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_PYPI == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/linwarden
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python package distributions
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
