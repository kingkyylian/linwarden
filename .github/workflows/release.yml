name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Compile sources
        run: PYTHONPYCACHEPREFIX=.pycache python -m compileall -q src tests scripts

      - name: Run Ruff
        run: python -m ruff check src tests scripts

      - name: Run mypy
        run: python -m mypy

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        if: vars.PUBLISH_PYPI == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Generate release checksums
        run: python scripts/release_assets.py dist

      - name: Sign checksum manifest
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY is not configured; skipping detached checksum signature."
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          if [ -n "$GPG_PASSPHRASE" ]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --armor --detach-sign dist/SHA256SUMS
          else
            gpg --batch --yes --armor --detach-sign dist/SHA256SUMS
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --title "$GITHUB_REF_NAME"
